<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display Videos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }

        .container {
            background: white;
            width: min(700px, 100%);
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #7b2d2d;
        }

        h3 {
            text-align: left;
            margin-left: 20px;
        }

        video, iframe {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 16 / 9;
            margin: 10px 0 20px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Task 2: Display Videos</h1>

    <h3>Internal Video</h3>
    <video controls>
        <source src="AOA - Miniskirt (짧은치마) [Audio] HD.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <h3>External Video</h3>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/glscfhJyZHo?si=cKb5wSZtMBGGWHuL" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>

</body>
</html>
