<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h2 {
            text-align: center;
            color: maroon;
        }
        table {
            border-collapse: collapse;
            margin: 20px auto;
            width: 80%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .left {
            text-align: left;
        }
    </style>
</head>
<body>

<h2>Task 4: Create Student Table</h2>

<table>
    <tr>
        <th rowspan="2">No.</th>
        <th rowspan="2">Student Name</th>
        <th colspan="4">Score</th>
    </tr>
    <tr>
        <th>Attendance</th>
        <th>Homework and Lab</th>
        <th>Project</th>
        <th>Score</th>
    </tr>
    <tr>
        <td>1</td>
        <td class="left">Thong Bunleng</td>
        <td>10</td>
        <td>30</td>
        <td>50</td>
        <td>90</td>
    </tr>
    <tr>
        <td>2</td>
        <td class="left">Ang Senghong</td>
        <td>10</td>
        <td>40</td>
        <td>50</td>
        <td>100</td>
    </tr>
    <tr>
        <td>3</td>
        <td class="left">Ol Oudompanha</td>
        <td>10</td>
        <td>40</td>
        <td>35</td>
        <td>85</td>
    </tr>
    <tr>
        <td>4</td>
        <td class="left">Horn Sochetra</td>
        <td>10</td>
        <td>35</td>
        <td>45</td>
        <td>90</td>
    </tr>
    <tr>
        <td colspan="5"><strong>Total Student</strong></td>
        <td>4</td>
    </tr>
</table>

</body>
</html>
